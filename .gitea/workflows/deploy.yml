name: Deploy to Staging

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/parental-benefit-calculator:${{ github.sha }},${{ secrets.REGISTRY_URL }}/parental-benefit-calculator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull ${{ secrets.REGISTRY_URL }}/parental-benefit-calculator:latest
            docker stop parental-benefit-calculator || true
            docker rm parental-benefit-calculator || true
            docker run -d \
              --name parental-benefit-calculator \
              --restart unless-stopped \
              -p 3000:3000 \
              -v parental-benefit-data:/app/data \
              ${{ secrets.REGISTRY_URL }}/parental-benefit-calculator:latest
            docker image prune -f

      - name: Deployment summary
        run: echo "Deployed ${{ github.sha }} to staging"
