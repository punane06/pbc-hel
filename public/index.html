<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parental Benefit Calculator</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gray-100 font-sans dark:bg-gray-900 dark:text-white">

    <div class="max-w-5xl mx-auto mt-4 md:mt-10 bg-white dark:bg-gray-800 p-4 md:p-8 rounded-xl shadow-lg">

        <div class="flex justify-between items-center mb-8">

            <h1 id="title" class="text-3xl font-bold"></h1>

            <div class="flex gap-3">

                <button onclick="setLanguage('en')" class="text-xl">🇬🇧</button>
                <button onclick="setLanguage('et')" class="text-xl">🇪🇪</button>
                <button onclick="toggleDarkMode()" class="text-xl">🌙</button>

            </div>

        </div>

        <h2 id="inputSection" class="text-xl font-semibold mb-4"></h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">

            <div>

                <label id="salaryLabel" class="font-medium"></label>

                <input id="salary" type="number" class="w-full p-3 border rounded-lg text-black mt-1"
                    placeholder="3000">

                <p id="salaryHelp" class="text-sm text-gray-500 mt-1"></p>
                <p id="salaryError" class="hidden text-sm text-rose-600 mt-1"></p>

            </div>

            <div>

                <label id="birthLabel" class="font-medium"></label>

                <input id="birthDate" type="date" class="w-full p-3 border rounded-lg text-black mt-1">

                <p id="birthHelp" class="text-sm text-gray-500 mt-1"></p>
                <p id="birthError" class="hidden text-sm text-rose-600 mt-1"></p>

            </div>

        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-6">

            <button id="saveBtn" onclick="saveApplication()"
                class="flex-1 bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700">
            </button>

            <button id="pdfBtn" onclick="downloadPDF()"
                class="flex-1 bg-green-600 text-white p-3 rounded-lg hover:bg-green-700">
            </button>

        </div>

        <div id="statusMessage" role="status" aria-live="polite" aria-atomic="true"
            class="hidden mb-6 rounded-lg border px-4 py-3 text-sm">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                <p id="statusText" class="leading-relaxed"></p>
                <button id="copyIdBtn" onclick="copySavedApplicationId()"
                    class="hidden self-start md:self-auto bg-white/80 text-slate-800 border border-slate-300 rounded-md px-3 py-1.5 text-xs font-semibold hover:bg-white">
                </button>
            </div>
        </div>

        <div class="mb-6">

            <h3 id="restoreTitle" class="font-semibold text-base"></h3>
            <p id="restoreSteps" class="text-sm text-gray-500 mt-1 mb-3"></p>

        </div>

        <div class="grid grid-cols-1 md:grid-cols-[minmax(0,1fr)_auto_auto] gap-3 items-end mb-6">

            <div>

                <label id="applicationIdLabel" for="applicationId" class="font-medium"></label>

                <input id="applicationId" type="number" min="1" class="w-full p-3 border rounded-lg text-black mt-1"
                    placeholder="1">

                <p id="restoreHelp" class="text-sm text-gray-500 mt-1"></p>
                <p id="applicationIdError" class="hidden text-sm text-rose-600 mt-1"></p>

            </div>

            <button id="loadBtn" onclick="loadApplication()"
                class="bg-slate-700 text-white p-3 rounded-lg hover:bg-slate-800 md:min-w-40">
            </button>

            <button id="loadLastBtn" onclick="loadLastSavedApplication()"
                class="bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700 md:min-w-48 disabled:opacity-50 disabled:cursor-not-allowed">
            </button>

        </div>

        <h2 id="summaryTitle" class="text-xl font-semibold mb-4"></h2>

        <div id="summary" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10 hidden">

            <div class="bg-blue-100 p-4 rounded-lg text-center text-black">
                <p id="salaryCardLabel" class="text-sm"></p>
                <p id="summarySalary" class="font-bold"></p>
            </div>

            <div class="bg-blue-100 p-4 rounded-lg text-center text-black">
                <p id="dailyCardLabel" class="text-sm"></p>
                <p id="summaryDaily" class="font-bold"></p>
            </div>

            <div class="bg-blue-100 p-4 rounded-lg text-center text-black">
                <p id="capCardLabel" class="text-sm"></p>
                <p id="summaryCap" class="font-bold"></p>
            </div>

            <div class="bg-blue-100 p-4 rounded-lg text-center text-black">
                <p id="totalCardLabel" class="text-sm"></p>
                <p id="summaryTotal" class="font-bold"></p>
            </div>

        </div>

        <h2 id="paymentsTitle" class="text-xl font-semibold mb-4"></h2>

        <div class="overflow-x-auto">

            <table class="w-full border min-w-[560px]">

                <thead class="bg-gray-200 dark:bg-gray-700">

                    <tr>
                        <th id="monthHeader" class="p-2"></th>
                        <th id="yearHeader" class="p-2"></th>
                        <th id="daysHeader" class="p-2"></th>
                        <th id="paymentHeader" class="p-2"></th>
                    </tr>

                </thead>

                <tbody id="results"></tbody>

            </table>

        </div>

        <h3 id="total" class="text-right font-bold mt-3"></h3>

        <h2 id="chartTitle" class="text-xl font-semibold mt-10 mb-4"></h2>

        <canvas id="benefitChart"></canvas>

    </div>

    <script type="module" src="/js/app.js"></script>

</body>

</html>
