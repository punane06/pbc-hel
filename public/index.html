<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parental Benefit Calculator</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gray-100 font-sans dark:bg-gray-900 dark:text-white">

    <div class="max-w-5xl mx-auto mt-4 md:mt-10 bg-white dark:bg-gray-800 p-4 md:p-8 rounded-xl shadow-lg">

        <div class="flex justify-between items-center mb-8">

            <h1 id="title" class="text-3xl font-bold"></h1>

            <div class="flex gap-3">

                <button onclick="setLanguage('en')" class="text-xl">🇬🇧</button>
                <button onclick="setLanguage('et')" class="text-xl">🇪🇪</button>
                <button onclick="toggleDarkMode()" class="text-xl">🌙</button>

            </div>

        </div>

        <h2 id="inputSection" class="text-xl font-semibold mb-4"></h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">

            <div>

                <label id="salaryLabel" class="font-medium"></label>

                <input id="salary" type="number" class="w-full p-3 border rounded-lg text-black mt-1"
                    placeholder="3000">

                <p id="salaryHelp" class="text-sm text-gray-500 mt-1"></p>

            </div>

            <div>

                <label id="birthLabel" class="font-medium"></label>

                <input id="birthDate" type="date" class="w-full p-3 border rounded-lg text-black mt-1">

                <p id="birthHelp" class="text-sm text-gray-500 mt-1"></p>

            </div>

        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-6">

            <button id="saveBtn" onclick="saveApplication()"
                class="flex-1 bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700">
            </button>

            <button id="pdfBtn" onclick="downloadPDF()"
                class="flex-1 bg-green-600 text-white p-3 rounded-lg hover:bg-green-700">
            </button>

        </div>

        <div id="statusMessage" class="hidden mb-6 rounded-lg border px-4 py-3 text-sm">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                <p id="statusText" class="leading-relaxed"></p>
                <button id="copyIdBtn" onclick="copySavedApplicationId()"
                    class="hidden self-start md:self-auto bg-white/80 text-slate-800 border border-slate-300 rounded-md px-3 py-1.5 text-xs font-semibold hover:bg-white">
                </button>
            </div>
        </div>

        <div class="mb-6">

            <h3 id="restoreTitle" class="font-semibold text-base"></h3>
            <p id="restoreSteps" class="text-sm text-gray-500 mt-1 mb-3"></p>

        </div>

        <div class="grid grid-cols-1 md:grid-cols-[minmax(0,1fr)_auto_auto] gap-3 items-end mb-6">

            <div>

                <label id="applicationIdLabel" for="applicationId" class="font-medium"></label>

                <input id="applicationId" type="number" min="1" class="w-full p-3 border rounded-lg text-black mt-1"
                    placeholder="1">

                <p id="restoreHelp" class="text-sm text-gray-500 mt-1"></p>

            </div>

            <button id="loadBtn" onclick="loadApplication()"
                class="bg-slate-700 text-white p-3 rounded-lg hover:bg-slate-800 md:min-w-40">
            </button>

            <button id="loadLastBtn" onclick="loadLastSavedApplication()"
                class="bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700 md:min-w-48 disabled:opacity-50 disabled:cursor-not-allowed">
            </button>

        </div>

        <h2 id="summaryTitle" class="text-xl font-semibold mb-4"></h2>

        <div id="summary" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10 hidden">

            <div class="bg-blue-100 p-4 rounded-lg text-center text-black">
                <p id="salaryCardLabel" class="text-sm"></p>
                <p id="summarySalary" class="font-bold"></p>
            </div>

            <div class="bg-blue-100 p-4 rounded-lg text-center text-black">
                <p id="dailyCardLabel" class="text-sm"></p>
                <p id="summaryDaily" class="font-bold"></p>
            </div>

            <div class="bg-blue-100 p-4 rounded-lg text-center text-black">
                <p id="capCardLabel" class="text-sm"></p>
                <p id="summaryCap" class="font-bold"></p>
            </div>

            <div class="bg-blue-100 p-4 rounded-lg text-center text-black">
                <p id="totalCardLabel" class="text-sm"></p>
                <p id="summaryTotal" class="font-bold"></p>
            </div>

        </div>

        <h2 id="paymentsTitle" class="text-xl font-semibold mb-4"></h2>

        <div class="overflow-x-auto">

            <table class="w-full border min-w-[560px]">

                <thead class="bg-gray-200 dark:bg-gray-700">

                    <tr>
                        <th id="monthHeader" class="p-2"></th>
                        <th id="yearHeader" class="p-2"></th>
                        <th id="daysHeader" class="p-2"></th>
                        <th id="paymentHeader" class="p-2"></th>
                    </tr>

                </thead>

                <tbody id="results"></tbody>

            </table>

        </div>

        <h3 id="total" class="text-right font-bold mt-3"></h3>

        <h2 id="chartTitle" class="text-xl font-semibold mt-10 mb-4"></h2>

        <canvas id="benefitChart"></canvas>

    </div>

    <script>

        let chart = null
        let currentLanguage = "et"

        const translations = {

            en: {

                title: "Parental Benefit Calculator",
                inputSection: "Input Data",
                salary: "Gross Monthly Salary (€)",
                salaryHelp: "Salary before taxes.",
                birth: "Baby Birth Date",
                birthHelp: "Date when the child is born.",
                save: "Save Progress",
                pdf: "Download PDF",
                applicationId: "Saved Application ID",
                restoreHelp: "Enter an application ID to restore saved progress.",
                restoreHelpWithId: "Latest saved application ID on this device: {id}",
                restoreTitle: "Continue with a saved application",
                restoreSteps: "Step 1: Enter the application ID. Step 2: Select \"Load Saved Application\".",
                load: "Load Saved Application",
                loadLast: "Load Last Saved",
                copyId: "Copy ID",
                summary: "Calculation Summary",
                salaryCard: "Salary",
                dailyRate: "Daily Rate",
                cap: "Cap Applied",
                total: "Total Benefit",
                payments: "Benefit Payments",
                month: "Month",
                year: "Year",
                days: "Days Paid",
                payment: "Payment (€)",
                chart: "Benefit Chart",
                capYes: "Yes",
                capNo: "No",
                statusMissingFields: "Enter salary and birth date before saving or calculating.",
                statusSaved: "Progress saved. Application ID: {id}. Enter this ID below and select \"Load Saved Application\" to continue later.",
                statusLoaded: "Saved application #{id} loaded successfully.",
                statusNotFound: "No saved application was found with ID #{id}.",
                statusSaveError: "Saving failed. Please try again.",
                statusLoadError: "Loading failed. Please try again.",
                statusCalculateError: "Calculation failed. Please check input values and try again.",
                statusPdfError: "PDF generation failed. Please try again.",
                statusIdCopied: "Application ID #{id} copied to clipboard.",
                statusNoLocalSave: "No previously saved application ID was found on this device.",
                statusMissingApplicationId: "Enter an application ID before loading.",
                statusCopyError: "Copying the application ID failed. Please copy it manually."

            },

            et: {

                title: "Vanemahüvitise kalkulaator",
                inputSection: "Sisendandmed",
                salary: "Brutokuupalk (€)",
                salaryHelp: "Brutokuupalk enne maksude mahaarvamist.",
                birth: "Lapse sünnikuupäev",
                birthHelp: "Kuupäev, millal laps sündis.",
                save: "Salvesta pooleliolev töö",
                pdf: "Lae PDF",
                applicationId: "Salvestatud avalduse ID",
                restoreHelp: "Sisesta avalduse ID, et salvestatud andmed taastada.",
                restoreHelpWithId: "Selles brauseris viimati salvestatud avalduse ID: {id}",
                restoreTitle: "Jätka salvestatud avaldusega",
                restoreSteps: "Samm 1: Sisesta avalduse ID. Samm 2: Vajuta \"Laadi salvestatud avaldus\".",
                load: "Laadi salvestatud avaldus",
                loadLast: "Laadi viimane salvestus",
                copyId: "Kopeeri ID",
                summary: "Arvutuse kokkuvõte",
                salaryCard: "Brutokuupalk",
                dailyRate: "Päevaraha",
                cap: "Ülemäärane piir rakendub",
                total: "Vanemahüvitise kogusumma",
                payments: "Väljamaksed kuude kaupa",
                month: "Kuu",
                year: "Aasta",
                days: "Makstud päevad",
                payment: "Väljamakse (€)",
                chart: "Väljamaksete graafik",
                capYes: "Jah",
                capNo: "Ei",
                statusMissingFields: "Sisesta enne salvestamist või arvutamist palk ja sünnikuupäev.",
                statusSaved: "Andmed on salvestatud. Avalduse ID: {id}. Hiljem jätkamiseks sisesta ID allpool ja vajuta \"Laadi salvestatud avaldus\".",
                statusLoaded: "Salvestatud avaldus #{id} on edukalt laaditud.",
                statusNotFound: "Avaldust ID-ga #{id} ei leitud.",
                statusSaveError: "Salvestamine ebaõnnestus. Proovi uuesti.",
                statusLoadError: "Laadimine ebaõnnestus. Proovi uuesti.",
                statusCalculateError: "Arvutamine ebaõnnestus. Kontrolli sisendväärtusi ja proovi uuesti.",
                statusPdfError: "PDF loomine ebaõnnestus. Proovi uuesti.",
                statusIdCopied: "Avalduse ID #{id} on kopeeritud lõikelauale.",
                statusNoLocalSave: "Selles seadmes ei leitud varem salvestatud avalduse ID-d.",
                statusMissingApplicationId: "Sisesta enne laadimist avalduse ID.",
                statusCopyError: "Avalduse ID kopeerimine ebaõnnestus. Kopeeri ID käsitsi."

            }

        }

        const statusStyles = {
            info: "border-slate-300 bg-slate-50 text-slate-700",
            success: "border-emerald-300 bg-emerald-50 text-emerald-700",
            error: "border-rose-300 bg-rose-50 text-rose-700"
        }

        function applyLanguage() {

            const t = translations[currentLanguage]

            document.getElementById("title").innerText = t.title
            document.getElementById("inputSection").innerText = t.inputSection

            document.getElementById("salaryLabel").innerText = t.salary
            document.getElementById("salaryHelp").innerText = t.salaryHelp

            document.getElementById("birthLabel").innerText = t.birth
            document.getElementById("birthHelp").innerText = t.birthHelp

            document.getElementById("saveBtn").innerText = t.save
            document.getElementById("pdfBtn").innerText = t.pdf
            document.getElementById("applicationIdLabel").innerText = t.applicationId
            document.getElementById("restoreTitle").innerText = t.restoreTitle
            document.getElementById("restoreSteps").innerText = t.restoreSteps
            document.getElementById("loadBtn").innerText = t.load
            document.getElementById("loadLastBtn").innerText = t.loadLast
            document.getElementById("copyIdBtn").innerText = t.copyId

            document.getElementById("summaryTitle").innerText = t.summary

            document.getElementById("salaryCardLabel").innerText = t.salaryCard
            document.getElementById("dailyCardLabel").innerText = t.dailyRate
            document.getElementById("capCardLabel").innerText = t.cap
            document.getElementById("totalCardLabel").innerText = t.total

            document.getElementById("paymentsTitle").innerText = t.payments

            document.getElementById("monthHeader").innerText = t.month
            document.getElementById("yearHeader").innerText = t.year
            document.getElementById("daysHeader").innerText = t.days
            document.getElementById("paymentHeader").innerText = t.payment

            document.getElementById("chartTitle").innerText = t.chart

            updateRestoreHelp()

        }

        function setLanguage(lang) {

            currentLanguage = lang
            applyLanguage()
            calculate()

        }

        function toggleDarkMode() {

            document.body.classList.toggle("dark")

        }

        function formatCurrency(value) {

            return new Intl.NumberFormat("et-EE", {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(Number(value)) + " €"

        }

        function convertDate(date) {

            const [year, month, day] = date.split("-")

            return `${day}.${month}.${year}`

        }

        function convertStoredDateToInput(date) {

            const [day, month, year] = date.split(".")

            return `${year}-${month}-${day}`

        }

        function getFormValues() {

            return {
                salary: document.getElementById("salary").value,
                birthDateRaw: document.getElementById("birthDate").value
            }

        }

        function setStatus(message, type = "info", options = {}) {

            const statusMessage = document.getElementById("statusMessage")
            const statusText = document.getElementById("statusText")
            const copyIdBtn = document.getElementById("copyIdBtn")

            statusMessage.className = `mb-6 rounded-lg border px-4 py-3 text-sm ${statusStyles[type] || statusStyles.info}`
            statusText.innerText = message

            if (options.copyId) {
                copyIdBtn.dataset.applicationId = String(options.copyId)
                copyIdBtn.classList.remove("hidden")
            } else {
                copyIdBtn.dataset.applicationId = ""
                copyIdBtn.classList.add("hidden")
            }

            statusMessage.classList.remove("hidden")

        }

        async function copySavedApplicationId() {

            const copyIdBtn = document.getElementById("copyIdBtn")
            const applicationId = copyIdBtn.dataset.applicationId

            if (!applicationId) return

            try {

                await navigator.clipboard.writeText(applicationId)
                setStatus(
                    translations[currentLanguage].statusIdCopied.replace("{id}", applicationId),
                    "success"
                )

            } catch (error) {

                setStatus(translations[currentLanguage].statusSaveError, "error")

            }

        }

        function updateRestoreHelp() {

            const t = translations[currentLanguage]
            const savedId = localStorage.getItem("lastSavedApplicationId")
            const loadLastBtn = document.getElementById("loadLastBtn")

            document.getElementById("restoreHelp").innerText = savedId
                ? t.restoreHelpWithId.replace("{id}", savedId)
                : t.restoreHelp

            loadLastBtn.disabled = !savedId

        }

        function syncApplicationIdInUrl(applicationId) {

            const url = new URL(window.location.href)

            if (applicationId) {
                url.searchParams.set("applicationId", applicationId)
            } else {
                url.searchParams.delete("applicationId")
            }

            window.history.replaceState({}, "", url)

        }

        async function readApiErrorMessage(response, fallbackMessage) {

            try {

                const payload = await response.json()

                if (payload && Array.isArray(payload.details) && payload.details.length > 0) {
                    return payload.details.join(" ")
                }

                if (payload && payload.error) {
                    return payload.error
                }

                return fallbackMessage

            } catch (error) {

                return fallbackMessage

            }

        }

        async function calculate() {

            const { salary, birthDateRaw } = getFormValues()

            if (!salary || !birthDateRaw) return

            const birthDate = convertDate(birthDateRaw)

            let data

            try {

                const response = await fetch("/calculate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ salary, birthDate })
                })

                if (!response.ok) {
                    setStatus(
                        await readApiErrorMessage(response, translations[currentLanguage].statusCalculateError),
                        "error"
                    )
                    return
                }

                data = await response.json()

            } catch (error) {

                setStatus(translations[currentLanguage].statusCalculateError, "error")
                return

            }

            const table = document.getElementById("results")
            table.innerHTML = ""

            let total = 0
            let labels = []
            let payments = []

            const months = currentLanguage === "et" ?
                ["Jaanuar", "Veebruar", "Märts", "Aprill", "Mai", "Juuni", "Juuli", "August", "September", "Oktoober", "November", "Detsember"]
                :
                ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"]

            data.forEach(row => {

                const payment = Number(row.payment)

                total += payment

                labels.push(months[row.month - 1])
                payments.push(payment)

                const tr = document.createElement("tr")

                tr.innerHTML = `
<td class="p-2">${months[row.month - 1]}</td>
<td class="p-2 text-center">${row.year}</td>
<td class="p-2 text-center">${row.daysPaid}</td>
<td class="p-2 text-right">${formatCurrency(payment)}</td>
`

                table.appendChild(tr)

            })

            document.getElementById("total").innerText = formatCurrency(total)

            const cappedSalary = Math.min(salary, 4000)
            const dailyRate = cappedSalary / 30

            document.getElementById("summarySalary").innerText = formatCurrency(salary)
            document.getElementById("summaryDaily").innerText = formatCurrency(dailyRate)
            document.getElementById("summaryCap").innerText = salary > 4000
                ? translations[currentLanguage].capYes
                : translations[currentLanguage].capNo
            document.getElementById("summaryTotal").innerText = formatCurrency(total)

            document.getElementById("summary").classList.remove("hidden")

            renderChart(labels, payments)

        }

        function renderChart(labels, data) {

            const ctx = document.getElementById("benefitChart")

            if (chart) chart.destroy()

            chart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: "#3b82f6"
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } }
                }
            })

        }

        async function downloadPDF() {

            const { salary, birthDateRaw } = getFormValues()

            if (!salary || !birthDateRaw) return

            const birthDate = convertDate(birthDateRaw)

            try {

                const response = await fetch("/pdf", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        salary,
                        birthDate,
                        lang: currentLanguage
                    })
                })

                if (!response.ok) {
                    setStatus(
                        await readApiErrorMessage(response, translations[currentLanguage].statusPdfError),
                        "error"
                    )
                    return
                }

                const blob = await response.blob()

                const url = window.URL.createObjectURL(blob)

                const a = document.createElement("a")
                a.href = url
                a.download = "benefits.pdf"
                a.click()

            } catch (error) {

                setStatus(translations[currentLanguage].statusPdfError, "error")

            }

        }

        async function saveApplication() {

            const { salary, birthDateRaw } = getFormValues()

            if (!salary || !birthDateRaw) {
                setStatus(translations[currentLanguage].statusMissingFields, "error")
                return
            }

            const birthDate = convertDate(birthDateRaw)

            try {

                const response = await fetch("/save", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ salary, birthDate })
                })

                if (!response.ok) {
                    setStatus(
                        await readApiErrorMessage(response, translations[currentLanguage].statusSaveError),
                        "error"
                    )
                    return
                }

                const data = await response.json()
                const applicationId = String(data.id)

                document.getElementById("applicationId").value = applicationId
                localStorage.setItem("lastSavedApplicationId", applicationId)
                syncApplicationIdInUrl(applicationId)
                updateRestoreHelp()
                setStatus(
                    translations[currentLanguage].statusSaved.replace("{id}", applicationId),
                    "success",
                    { copyId: applicationId }
                )

            } catch (error) {

                setStatus(translations[currentLanguage].statusSaveError, "error")

            }

        }

        async function loadApplication() {

            const applicationId = document.getElementById("applicationId").value.trim()

            if (!applicationId) {
                setStatus(translations[currentLanguage].statusMissingApplicationId, "error")
                return
            }

            await loadApplicationById(applicationId)

        }

        async function loadLastSavedApplication() {

            const applicationId = localStorage.getItem("lastSavedApplicationId")

            if (!applicationId) {
                setStatus(translations[currentLanguage].statusNoLocalSave, "info")
                return
            }

            document.getElementById("applicationId").value = applicationId
            await loadApplicationById(applicationId)

        }

        async function loadApplicationById(applicationId) {

            try {

                const response = await fetch(`/load/${applicationId}`)

                if (response.status === 404) {
                    setStatus(translations[currentLanguage].statusNotFound.replace("{id}", applicationId), "error")
                    return
                }

                if (!response.ok) {
                    setStatus(
                        await readApiErrorMessage(response, translations[currentLanguage].statusLoadError),
                        "error"
                    )
                    return
                }

                const data = await response.json()

                document.getElementById("salary").value = data.salary
                document.getElementById("birthDate").value = convertStoredDateToInput(data.birthDate)
                document.getElementById("applicationId").value = data.id

                localStorage.setItem("lastSavedApplicationId", String(data.id))
                syncApplicationIdInUrl(data.id)
                updateRestoreHelp()

                await calculate()

                setStatus(translations[currentLanguage].statusLoaded.replace("{id}", data.id), "success")

            } catch (error) {

                setStatus(translations[currentLanguage].statusLoadError, "error")

            }

        }

        async function initializeSavedApplication() {

            const applicationId = new URLSearchParams(window.location.search).get("applicationId")
            const lastSavedApplicationId = localStorage.getItem("lastSavedApplicationId")

            if (applicationId) {
                document.getElementById("applicationId").value = applicationId
                await loadApplicationById(applicationId)
                return
            }

            if (lastSavedApplicationId) {
                document.getElementById("applicationId").value = lastSavedApplicationId
            }

            updateRestoreHelp()

        }

        document.getElementById("salary").addEventListener("input", calculate)
        document.getElementById("birthDate").addEventListener("input", calculate)
        document.getElementById("applicationId").addEventListener("keydown", async (event) => {
            if (event.key === "Enter") {
                event.preventDefault()
                await loadApplication()
            }
        })

        applyLanguage()
        initializeSavedApplication()

    </script>

</body>

</html>
